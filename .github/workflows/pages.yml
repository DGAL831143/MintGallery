name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - apps/web/**
      - package.json
      - package-lock.json
      - VERSION
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build static preview
        env:
          VITE_PAGES_PREVIEW: 'true'
        run: npm run build -w @mintgallery/web -- --base=/MintGallery/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
